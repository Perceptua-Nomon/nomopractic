name: CI

on:
  push:
    tags: ["v*"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # check: fmt + clippy + tests (native x86_64, no hardware)
  # ──────────────────────────────────────────────────────────────────────────
  check:
    name: Check (fmt + clippy + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --all

  # ──────────────────────────────────────────────────────────────────────────
  # cross: aarch64 release binary (build only — no runtime test on CI)
  # ──────────────────────────────────────────────────────────────────────────
  cross:
    name: Cross-compile aarch64
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-aarch64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-aarch64-

      - name: Install cross
        run: cargo install cross --locked

      - name: cross build --release
        run: cross build --target aarch64-unknown-linux-gnu --release

      - name: Compute SHA-256
        id: sha
        run: |
          sha256sum target/aarch64-unknown-linux-gnu/release/nomopractic \
            > target/aarch64-unknown-linux-gnu/release/nomopractic.sha256
          echo "sha=$(cat target/aarch64-unknown-linux-gnu/release/nomopractic.sha256 | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: nomopractic-aarch64
          path: |
            target/aarch64-unknown-linux-gnu/release/nomopractic
            target/aarch64-unknown-linux-gnu/release/nomopractic.sha256
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────
  # release: attach binary to GitHub Release when a vX.Y.Z tag is pushed
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: cross
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download cross-compiled artifact
        uses: actions/download-artifact@v4
        with:
          name: nomopractic-aarch64
          path: dist/

      - name: Rename binary with version tag
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mv dist/nomopractic "dist/nomopractic-${VERSION}-aarch64-linux"
          # Recompute sha256 with the renamed file name
          sha256sum "dist/nomopractic-${VERSION}-aarch64-linux" \
            > "dist/nomopractic-${VERSION}-aarch64-linux.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/nomopractic-*-aarch64-linux
            dist/nomopractic-*-aarch64-linux.sha256
          generate_release_notes: true
