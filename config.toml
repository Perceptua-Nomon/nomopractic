i2c_bus = 1
hat_address = 0x14
socket_path = "/run/nomopractic/nomopractic.sock"
socket_mode = 432  # 0o660
log_level = "info"
servo_default_ttl_ms = 500
motor_default_ttl_ms = 500
watchdog_poll_ms = 100

# Motor channel configuration — Robot HAT V4 TC1508S H-bridge driver.
# Each [[motors]] entry maps an IPC motor index (0-based) to a hardware PWM
# channel (12–15) and a BCM GPIO direction pin.  The entries below match the
# SunFounder PicarX wiring; adjust pwm_channel, dir_pin_bcm, and reversed for
# other robot configurations.

[[motors]]
pwm_channel = 12   # P12
dir_pin_bcm = 24   # D5 (BCM 24)
reversed    = false

[[motors]]
pwm_channel = 13   # P13
dir_pin_bcm = 23   # D4 (BCM 23)
reversed    = true  # right motor is wired with reversed polarity on PicarX

# Named servo channel configuration — maps logical servo roles to Robot HAT V4
# PWM channels (0–11).  Set a channel to the correct PWM output for your
# wiring; omit the key (or comment it out) to disable that servo.
# Defaults below match the SunFounder PicarX.

[servos]
camera_pan  = 0   # P0 — horizontal camera rotation
camera_tilt = 1   # P1 — vertical camera tilt
steering    = 2   # P2 — front-wheel steering servo

# Named ADC sensor channel configuration — maps logical sensor roles to Robot
# HAT V4 ADC channels (0–7).  Defaults below match the SunFounder PicarX
# grayscale module (A0–A2).

[sensors]
grayscale = [0, 1, 2]   # A0 = left, A1 = centre, A2 = right

# Ultrasonic distance sensor GPIO pin assignments (HC-SR04 compatible).
# Wiring matches SunFounder PicarX: TRIG → D2 (BCM 27), ECHO → D3 (BCM 22).

[ultrasonic]
trig_pin_bcm = 27   # D2 — trigger output
echo_pin_bcm = 22   # D3 — echo input
timeout_ms   = 20   # abort measurement after this many ms

# Speaker amplifier enable GPIO pin (BCM).
# On Robot HAT V4 this is BCM 20 (spk_en).  Setting HIGH enables the amplifier.
speaker_en_pin_bcm = 20

# ─── Calibration ────────────────────────────────────────────────────────────
# Motor, servo, and sensor calibration values are persisted to this file.
# Runtime changes via `set_motor_calibration`, `set_servo_calibration`, and
# `calibrate_grayscale` take effect immediately; `save_calibration` writes
# them here so they survive daemon restarts.

calibration_path = "/etc/nomopractic/calibration.toml"

# ─── Audio levels (ALSA mixer control) ──────────────────────────────────────
# Controls output volume (HifiBerry DAC) and mic capture gain (PCM2902 USB mic)
# via `amixer`.  Card indices and control names can be confirmed with
# `aplay -l` / `arecord -l` / `amixer -c <idx> scontrols`.

[audio]
output_card_index = 1             # ALSA card index for HifiBerry DAC output
output_control    = "PCM"         # ALSA sset control name for output volume
input_card_index  = 2             # ALSA card index for USB mic (PCM2902)
input_control     = "Mic"         # ALSA sset control name for capture gain

# ─── Routine Engine ──────────────────────────────────────────────────────────
# Configuration for autonomous on-robot routines (Phase 11).

[routine]
explore_speed_pct          = 30.0   # Drive speed during explore (1.0–100.0 %)
obstacle_threshold_cm      = 25.0   # Stop and avoid if distance < this (cm)
cliff_threshold_normalized = 0.7    # Treat as cliff if normalised value >= this (0.0–1.0)
loop_interval_ms           = 100    # Sensor poll interval (ms, >= 50)
avoidance_backup_ms        = 500    # Duration to reverse during avoidance (ms)
avoidance_turn_angle_deg   = 60.0   # Degrees added to 90° for avoidance turn
max_duration_s             = 300    # Auto-stop after this many seconds
